<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>나는 몇 % 청년 농부? 🌱</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --mint:    #b8f0d8;
  --mint2:   #7de0b4;
  --green:   #3aaa6e;
  --dgreen:  #1e7a4a;
  --peach:   #ffd6c0;
  --peach2:  #ffb490;
  --yellow:  #fff3b0;
  --yellow2: #ffe066;
  --lavender:#e0d4f7;
  --pink:    #ffd6e7;
  --sky:     #c8eeff;
  --cream:   #fffef5;
  --brown:   #5c3d1e;
  --gray:    #888;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  min-height:100vh;
  background: linear-gradient(160deg, #e8faf0 0%, #fff8e1 50%, #fce8f3 100%);
  font-family: 'Nanum Gothic', sans-serif;
  color: var(--brown);
}

/* 배경 떠다니는 장식 */
.deco{position:fixed;pointer-events:none;z-index:0;font-size:1.6rem;animation:float 6s ease-in-out infinite;opacity:0.45}
.deco:nth-child(1){top:6%;left:5%;animation-delay:0s}
.deco:nth-child(2){top:12%;right:8%;animation-delay:1.5s;font-size:1.2rem}
.deco:nth-child(3){top:40%;left:3%;animation-delay:3s;font-size:1rem}
.deco:nth-child(4){top:55%;right:4%;animation-delay:0.8s;font-size:1.4rem}
.deco:nth-child(5){bottom:18%;left:7%;animation-delay:2s;font-size:1.1rem}
.deco:nth-child(6){bottom:10%;right:6%;animation-delay:4s;font-size:1.3rem}
@keyframes float{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-12px) rotate(5deg)}}

.wrap{
  position:relative;z-index:1;
  max-width:420px;margin:0 auto;
  padding:1.5rem 1.2rem 3rem;
  min-height:100vh;
}

/* 상단 로고/제목 */
.top-logo{
  text-align:center;
  margin-bottom:1.2rem;
}
.top-logo .badge{
  display:inline-block;
  background:var(--green);
  color:#fff;
  font-size:11px;
  font-weight:800;
  padding:4px 14px;
  border-radius:30px;
  letter-spacing:0.05em;
  margin-bottom:0.5rem;
}
.top-logo h1{
  font-family:'Gaegu',cursive;
  font-size:2rem;
  line-height:1.25;
  color:var(--dgreen);
}
.top-logo p{
  font-size:13px;
  color:var(--gray);
  margin-top:4px;
}

/* 진행바 */
.prog-wrap{margin-bottom:1.2rem}
.prog-track{
  background:rgba(0,0,0,0.08);
  border-radius:10px;height:8px;overflow:hidden;
}
.prog-bar{
  height:8px;border-radius:10px;
  background:linear-gradient(90deg,var(--mint2),var(--green));
  transition:width 0.4s cubic-bezier(.4,0,.2,1);
}
.prog-label{font-size:12px;color:var(--gray);text-align:right;margin-top:4px}

/* 카드 */
.card{
  background:#fff;
  border-radius:24px;
  padding:1.5rem 1.3rem;
  box-shadow:0 4px 24px rgba(58,170,110,0.10), 0 1px 4px rgba(0,0,0,0.06);
  margin-bottom:1rem;
  animation:popIn 0.35s cubic-bezier(.4,0,.2,1);
}
@keyframes popIn{from{opacity:0;transform:translateY(16px) scale(0.97)}to{opacity:1;transform:none}}

.q-emoji{font-size:2.4rem;display:block;text-align:center;margin-bottom:0.75rem}
.q-text{
  font-size:16px;font-weight:700;
  line-height:1.55;
  text-align:center;
  color:var(--brown);
  margin-bottom:1.1rem;
}

/* 선택지 */
.options{display:flex;flex-direction:column;gap:9px}
.opt{
  padding:12px 16px;
  border-radius:16px;
  border:2px solid transparent;
  background:var(--cream);
  font-size:14px;
  font-weight:700;
  color:var(--brown);
  cursor:pointer;
  text-align:left;
  transition:all 0.18s;
  line-height:1.4;
  position:relative;
  outline:none;
}
.opt:hover{background:var(--mint);border-color:var(--mint2);transform:translateY(-1px)}
.opt.picked{background:var(--mint);border-color:var(--green);color:var(--dgreen)}
.opt .opt-emoji{margin-right:6px}

/* 결과 */
#result{display:none}
.result-card{
  background:#fff;
  border-radius:28px;
  padding:2rem 1.5rem 1.5rem;
  box-shadow:0 8px 32px rgba(58,170,110,0.13);
  text-align:center;
  animation:popIn 0.4s cubic-bezier(.4,0,.2,1);
}
.result-character{
  font-size:5rem;
  display:block;
  margin-bottom:0.5rem;
  animation:bounceIn 0.6s cubic-bezier(.4,0,.2,1) 0.1s both;
}
@keyframes bounceIn{0%{transform:scale(0.5);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}

.result-type-badge{
  display:inline-block;
  padding:5px 18px;
  border-radius:30px;
  font-size:13px;font-weight:800;
  margin-bottom:0.8rem;
}
.result-pct-wrap{
  margin:0.8rem 0;
}
.result-pct{
  font-family:'Gaegu',cursive;
  font-size:4rem;
  font-weight:700;
  line-height:1;
}
.result-pct span{font-size:1.5rem;font-weight:400}
.result-label{
  font-size:17px;font-weight:800;
  margin:0.5rem 0 0.75rem;
  line-height:1.4;
}
.result-desc{
  font-size:13px;color:#666;
  line-height:1.7;
  background:var(--cream);
  border-radius:14px;
  padding:12px 14px;
  margin-bottom:1.2rem;
  text-align:left;
}

/* 게이지 바 */
.gauge-wrap{margin:0.8rem 0 1rem}
.gauge-label{display:flex;justify-content:space-between;font-size:11px;color:var(--gray);margin-bottom:4px}
.gauge-track{background:rgba(0,0,0,0.07);border-radius:10px;height:14px;overflow:hidden}
.gauge-fill{
  height:14px;border-radius:10px;
  background:linear-gradient(90deg,var(--mint2),var(--green));
  transition:width 1.2s cubic-bezier(.4,0,.2,1);
  position:relative;
}
.gauge-fill::after{
  content:'';
  position:absolute;right:0;top:50%;transform:translateY(-50%);
  width:18px;height:18px;
  background:var(--green);
  border:3px solid #fff;
  border-radius:50%;
  box-shadow:0 2px 6px rgba(58,170,110,0.4);
}

/* 공유/버튼 */
.btn-cta{
  display:block;width:100%;
  padding:14px;
  border-radius:16px;
  border:none;
  background:var(--green);
  color:#fff;
  font-family:'Nanum Gothic',sans-serif;
  font-size:15px;font-weight:800;
  cursor:pointer;
  margin-bottom:8px;
  transition:transform 0.15s,box-shadow 0.15s;
  box-shadow:0 4px 14px rgba(58,170,110,0.35);
}
.btn-cta:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(58,170,110,0.45)}
.btn-retry{
  display:block;width:100%;
  padding:12px;
  border-radius:16px;
  border:2px solid var(--mint2);
  background:transparent;
  color:var(--green);
  font-family:'Nanum Gothic',sans-serif;
  font-size:14px;font-weight:700;
  cursor:pointer;
  transition:background 0.15s;
}
.btn-retry:hover{background:var(--mint)}

/* KOAT 하단 */
.footer-badge{
  text-align:center;margin-top:1.2rem;
  font-size:11px;color:var(--gray);
}
.footer-badge strong{color:var(--green)}

/* 인트로 */
#intro{animation:popIn 0.4s ease}
.intro-card{
  background:#fff;border-radius:28px;
  padding:2rem 1.5rem;
  box-shadow:0 4px 24px rgba(58,170,110,0.10);
  text-align:center;
}
.intro-icon{font-size:4rem;display:block;margin-bottom:0.75rem}
.intro-title{
  font-family:'Gaegu',cursive;
  font-size:1.7rem;color:var(--dgreen);
  line-height:1.3;margin-bottom:0.5rem;
}
.intro-sub{font-size:13px;color:#777;line-height:1.6;margin-bottom:1.5rem}
.btn-start{
  display:block;width:100%;
  padding:15px;border-radius:18px;border:none;
  background:linear-gradient(135deg,var(--mint2),var(--green));
  color:#fff;font-family:'Nanum Gothic',sans-serif;
  font-size:16px;font-weight:800;cursor:pointer;
  box-shadow:0 4px 16px rgba(58,170,110,0.35);
  transition:transform 0.15s;
}
.btn-start:hover{transform:translateY(-2px)}
</style>
</head>
<body>

<span class="deco">🌱</span>
<span class="deco">🍓</span>
<span class="deco">🌿</span>
<span class="deco">✨</span>
<span class="deco">🌾</span>
<span class="deco">🍅</span>

<div class="wrap">
  <div class="top-logo">
    <div class="badge">한국농업기술진흥원 × 스마트팜</div>
    <h1>나는 몇 %<br>청년 농부? 🌱</h1>
    <p>6가지 질문으로 알아보는 나의 농부 DNA</p>
  </div>

  <!-- 인트로 -->
  <div id="intro">
    <div class="intro-card">
      <span class="intro-icon">🧑‍🌾</span>
      <div class="intro-title">내 안에 잠든<br>청년 농부를 깨워봐요!</div>
      <div class="intro-sub">
        스마트팜은 농업 전공이 아니어도 괜찮아요.<br>
        6개의 질문으로 나의 농부 DNA를 확인해보세요 🌿
      </div>
      <button class="btn-start" onclick="startQuiz()">테스트 시작하기 🌱</button>
    </div>
  </div>

  <!-- 퀴즈 -->
  <div id="quiz" style="display:none">
    <div class="prog-wrap">
      <div class="prog-track"><div class="prog-bar" id="prog" style="width:0%"></div></div>
      <div class="prog-label" id="prog-label">0 / 6</div>
    </div>
    <div class="card" id="qcard">
      <span class="q-emoji" id="q-emoji"></span>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="options"></div>
    </div>
  </div>

  <!-- 결과 -->
  <div id="result">
    <div class="result-card">
      <span class="result-character" id="r-char"></span>
      <div class="result-type-badge" id="r-badge"></div>
      <div class="gauge-wrap">
        <div class="gauge-label"><span>0%</span><span>농부 DNA</span><span>100%</span></div>
        <div class="gauge-track"><div class="gauge-fill" id="r-gauge" style="width:0%"></div></div>
      </div>
      <div class="result-pct-wrap">
        <div class="result-pct" id="r-pct">0<span>%</span></div>
      </div>
      <div class="result-label" id="r-label"></div>
      <div class="result-desc" id="r-desc"></div>
      <button class="btn-cta" onclick="goInfo()">스마트팜 교육과정 알아보기 🌿</button>
      <button class="btn-retry" onclick="retry()">🔄 다시 해보기</button>
    </div>
    <div class="footer-badge">
      <strong>한국농업기술진흥원</strong> 혁신기술실증팀<br>
      스마트팜 청년창업 보육센터
    </div>
  </div>
</div>

<script>
const qs = [
  {
    emoji:"☀️",
    text:"주말 아침, 갑자기 혼자만의 시간이 생겼다. 나는?",
    opts:[
      {e:"🌱",t:"밖에 나가서 뭔가 직접 만들거나 가꾼다",s:2},
      {e:"📱",t:"유튜브·영상으로 새로운 걸 배운다",s:1},
      {e:"👫",t:"친구에게 연락해서 같이 뭔가 한다",s:1},
      {e:"😴",t:"그냥 쉰다, 아무것도 안 함",s:0},
    ]
  },
  {
    emoji:"🤔",
    text:"'스마트팜'이라는 단어를 들었을 때 첫 느낌은?",
    opts:[
      {e:"⚙️",t:"오 신기한데, 어떻게 작동하는 거지?",s:2},
      {e:"🍓",t:"직접 키운 걸 먹으면 맛있겠다!",s:2},
      {e:"🌾",t:"농업이 이렇게 바뀌었구나",s:1},
      {e:"😅",t:"농사... 나랑은 거리가 먼 것 같은데",s:0},
    ]
  },
  {
    emoji:"🪴",
    text:"식물을 키워본 경험이 있나요?",
    opts:[
      {e:"🌷",t:"화분·텃밭 지금도 키우고 있어요",s:2},
      {e:"💧",t:"한두 번 해봤는데 잘 안됐어요",s:1},
      {e:"👀",t:"없지만 해보고 싶다는 생각은 있어요",s:1},
      {e:"😬",t:"식물은 어렵고 무서워요",s:0},
    ]
  },
  {
    emoji:"📆",
    text:"20개월짜리 교육과정이 있다고 하면?",
    opts:[
      {e:"💪",t:"길어도 제대로 배울 수 있다면 OK!",s:2},
      {e:"🏠",t:"졸업 후 내 사업 가능하다면 고려해볼게요",s:2},
      {e:"🤷",t:"길긴 한데... 지원 혜택 보고 결정할래요",s:1},
      {e:"😓",t:"20개월은 너무 길어요",s:0},
    ]
  },
  {
    emoji:"🎓",
    text:"나의 전공·직무 배경은?",
    opts:[
      {e:"🌿",t:"농업·식품·생명과학 계열",s:2},
      {e:"💻",t:"공학·IT·환경 계열",s:2},
      {e:"📊",t:"경영·유통·마케팅 계열",s:1},
      {e:"🎨",t:"완전히 다른 분야 (문과, 예체능 등)",s:1},
    ]
  },
  {
    emoji:"🌅",
    text:"5년 후 나의 이상적인 모습은?",
    opts:[
      {e:"🏪",t:"내가 직접 운영하는 사업체를 갖고 싶어요",s:2},
      {e:"🌳",t:"자연 가까이에서 살고 싶어요",s:2},
      {e:"💼",t:"안정적인 직장에 다니고 싶어요",s:1},
      {e:"🔮",t:"아직 잘 모르겠어요",s:0},
    ]
  },
];

const results = [
  {
    min:0, max:30,
    char:"🌰", badge:"씨앗형", badgeBg:"#ffe8c8", badgeTc:"#a0522d",
    pct:22, label:"아직 씨앗 단계지만 가능성은 충분해요!",
    desc:"농업과 거리가 있어 보여도 괜찮아요. 스마트팜은 비농업 전공자도 충분히 시작할 수 있거든요 🌱 오늘 부스에서 직접 재배한 과일을 맛보고, 첫 걸음을 떼어보세요!"
  },
  {
    min:31, max:55,
    char:"🌿", badge:"새싹형", badgeBg:"#d4f5e2", badgeTc:"#1e7a4a",
    pct:50, label:"싹이 트고 있어요, 반쯤 왔네요!",
    desc:"관심은 있는데 아직 확신이 서지 않는 단계예요 🌿 20개월 교육을 통해 기술과 경영을 함께 배우면 그 확신이 쑥쑥 자랄 거예요!"
  },
  {
    min:56, max:79,
    char:"🍓", badge:"열매형", badgeBg:"#ffe0e8", badgeTc:"#c0395a",
    pct:75, label:"청년 농부 DNA를 이미 갖고 있어요!",
    desc:"도전 의지와 관심이 모두 갖춰진 타입이에요 🍓 스마트팜 청년창업 보육센터가 그 가능성을 현실로 만들어 드릴게요!"
  },
  {
    min:80, max:100,
    char:"🏆", badge:"수확형", badgeBg:"#fff3b0", badgeTc:"#a07800",
    pct:98, label:"당신은 이미 청년 농부입니다!",
    desc:"지금 바로 시작해도 될 것 같아요 🏆 20개월 집중 교육으로 스마트팜 창업까지 단번에 완성하세요. 지금이 딱 최고의 타이밍!"
  },
];

let cur=0, scores=[];

function startQuiz(){
  document.getElementById('intro').style.display='none';
  document.getElementById('quiz').style.display='block';
  renderQ();
}

function renderQ(){
  const q=qs[cur];
  document.getElementById('q-emoji').textContent=q.emoji;
  document.getElementById('q-text').textContent=q.text;
  document.getElementById('prog').style.width=((cur)/6*100)+'%';
  document.getElementById('prog-label').textContent=(cur)+' / 6';
  const el=document.getElementById('options');
  el.innerHTML='';
  q.opts.forEach((o,i)=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.innerHTML=`<span class="opt-emoji">${o.e}</span>${o.t}`;
    btn.onclick=()=>pick(i,o.s,btn);
    el.appendChild(btn);
  });
  // 카드 애니
  const card=document.getElementById('qcard');
  card.style.animation='none';
  void card.offsetWidth;
  card.style.animation='popIn 0.35s cubic-bezier(.4,0,.2,1)';
}

function pick(i,s,btn){
  document.querySelectorAll('.opt').forEach(b=>b.classList.remove('picked'));
  btn.classList.add('picked');
  scores[cur]=s;
  setTimeout(()=>{
    cur++;
    if(cur<6){renderQ();}
    else{showResult();}
  },320);
}

function showResult(){
  document.getElementById('quiz').style.display='none';
  const total=scores.reduce((a,b)=>a+b,0);
  const pct=Math.round(total/12*100);
  const r=results.find(x=>pct>=x.min&&pct<=x.max)||results[3];

  document.getElementById('r-char').textContent=r.char;
  const badge=document.getElementById('r-badge');
  badge.textContent=r.badge;
  badge.style.background=r.badgeBg;
  badge.style.color=r.badgeTc;
  document.getElementById('r-label').textContent=r.label;
  document.getElementById('r-desc').textContent=r.desc;

  // 숫자 카운트업
  const pctEl=document.getElementById('r-pct');
  let n=0;
  const tick=setInterval(()=>{
    n=Math.min(n+Math.ceil(r.pct/30),r.pct);
    pctEl.innerHTML=n+'<span>%</span>';
    if(n>=r.pct)clearInterval(tick);
  },30);

  document.getElementById('result').style.display='block';
  // 게이지 딜레이
  setTimeout(()=>{
    document.getElementById('r-gauge').style.width=r.pct+'%';
  },200);
}

function goInfo(){
  alert('📋 부스 담당자에게 문의해 주세요!\n스마트팜 청년창업 보육센터 20개월 교육과정 안내드립니다 🌱');
}

function retry(){
  cur=0;scores=[];
  document.getElementById('result').style.display='none';
  document.getElementById('quiz').style.display='block';
  document.getElementById('r-gauge').style.width='0%';
  renderQ();
}
</script>
</body>
</html>
